<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FiberFast | WispHub API Tester</title>
    <style>
        :root { --primary: #00d2ff; --bg: #0a0e14; --panel: #161b22; --text: #c9d1d9; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .wrapper { max-width: 1000px; margin: auto; }
        .config-panel { background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 20px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .field { flex: 1; min-width: 300px; }
        label { display: block; font-size: 12px; color: var(--primary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 6px; box-sizing: border-box; font-family: monospace; }
        button { background: var(--primary); color: #000; border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        .response-area { background: #000; border: 1px solid #30363d; border-radius: 8px; padding: 0; position: relative; min-height: 400px; }
        .response-header { background: #161b22; padding: 10px 20px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        #json-output { margin: 0; padding: 20px; color: #7ee787; font-family: 'Cascadia Code', monospace; font-size: 14px; overflow-x: auto; white-space: pre-wrap; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .status-ok { background: #238636; color: white; }
        .status-error { background: #da3633; color: white; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>🚀 FiberFast - Debugger de Red</h2>
    
    <div class="config-panel">
        <div class="input-row">
            <div class="field">
                <label>Tu WispHub Api-Key</label>
                <input type="text" id="token" placeholder="Ej: 52f5...3f">
            </div>
        </div>
        <div class="input-row">
            <div class="field" style="flex: 2;">
                <label>Endpoint (Base: https://api.wisphub.app/api)</label>
                <input type="text" id="endpoint" value="/clientes/ID_AQUI/" placeholder="/clientes/452/">
            </div>
            <div class="field" style="flex: 1; align-self: flex-end;">
                <button onclick="ejecutarTest()">DISPARAR PETICIÓN</button>
            </div>
        </div>
    </div>

    <div class="response-area">
        <div class="response-header">
            <span>RESULTADO JSON</span>
            <div id="status-badge"></div>
        </div>
        <pre id="json-output">Dale a "Disparar Petición" para ver la respuesta del servidor...</pre>
    </div>
</div>

<script>
    async function ejecutarTest() {
    const token = document.getElementById('token').value;
    const endpoint = document.getElementById('endpoint').value;
    const output = document.getElementById('json-output');
    const badge = document.getElementById('status-badge');
    
    // Agregamos este prefijo para saltar el bloqueo de CORS
    const PROXY = "https://cors-anywhere.herokuapp.com/";
    const BASE_URL = "https://api.wisphub.app/api";
    const FULL_URL = PROXY + BASE_URL + endpoint;

    if(!token) return alert("Falta la API Key");

    output.innerText = "⏳ Iniciando petición...";
    badge.innerHTML = '';

   try {
    const res = await fetch(FULL_URL, {
        method: 'GET',
        headers: {
            'Authorization': `Api-Key ${token}`,
            'Accept': 'application/json'
        }
    });

    // VERIFICACIÓN DE TIPO DE CONTENIDO
    const contentType = res.headers.get("content-type");
    
    if (contentType && contentType.indexOf("application/json") !== -1) {
        // Si es JSON, procedemos normal
        const data = await res.json();
        badge.innerHTML = `<span class="badge status-ok">HTTP ${res.status}</span>`;
        output.innerText = JSON.stringify(data, null, 4);
    } else {
        // SI NO ES JSON, leemos el texto para saber qué es (probablemente HTML)
        const textoError = await res.text();
        badge.innerHTML = `<span class="badge status-error">RESPUESTA NO-JSON</span>`;
        output.innerText = "EL SERVIDOR DEVOLVIÓ HTML (Posible error de URL o Proxy):\n\n" + textoError.substring(0, 500); // Mostramos los primeros 500 caracteres
        output.style.color = "#ff7b72";
    }

} catch (err) {
    output.innerText = "FALLO DE CONEXIÓN:\n" + err.message;
}
</script>

</body>
</html>
