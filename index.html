<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiberFast - Debugger API</title>
    <!-- Cargamos Axios para que sea igual a tu código de React Native -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        input { padding: 10px; width: 250px; border-radius: 4px; border: 1px solid #444; background: #222; color: white; }
        button { padding: 10px 20px; background: #00a8ff; border: none; color: white; border-radius: 4px; cursor: pointer; }
        pre { background: #000; padding: 15px; border-radius: 5px; overflow-x: auto; color: #0f0; border: 1px solid #222; }
        .status { font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>🛠️ Debugger Directo de WispHub</h2>
    <p>Probando endpoint: <code>https://api.wisphub.app/api/clientes/{id}/</code></p>

    <div class="card">
        <input type="text" id="idServicio" placeholder="Ingresa ID de Servicio (ej: 452)">
        <button onclick="probarEndpoint()">CONSULTAR ESTADO</button>
        
        <div id="status" class="status"></div>
        <h4>Respuesta de la API (Consola):</h4>
        <pre id="output">Los resultados aparecerán aquí...</pre>
    </div>

    <script>
        // CONFIGURACIÓN
        const API_KEY = 'LV4cqkWk.Q75LCb5TdjjavsjU4Kth0Nqem20Ki27c'; // <--- PEGA TU LLAVE AQUÍ
        const PROXY = 'https://cors-anywhere.herokuapp.com/';

        async function probarEndpoint() {
            const id = document.getElementById('idServicio').value;
            const output = document.getElementById('output');
            const statusDiv = document.getElementById('status');

            if(!id) return alert("Ingresa un ID");

            output.innerText = "Consultando...";
            statusDiv.innerText = "";

            try {
                // Construimos la URL tal cual la definiste
                const URL_FINAL = `${PROXY}https://api.wisphub.net/api/clientes/${id}/`;
                
                const response = await axios.get(URL_FINAL, {
                    headers: { 'Authorization': `Api-Key ${API_KEY}` }
                });

                // --- AQUÍ SE IMPRIME LO QUE QUERÍAS VER ---
                console.log("----------------------------");
                console.log("RESULTADO PARA ID:", id);
                console.log("ESTADO:", response.data.estado);
                console.log("JSON COMPLETO:", response.data);
                console.log("----------------------------");

                // Mostrar en pantalla
                output.innerText = JSON.stringify(response.data, null, 2);
                statusDiv.style.color = response.data.estado === 'Activo' ? '#0f0' : '#f00';
                statusDiv.innerText = "ESTADO: " + response.data.estado;

            } catch (error) {
                console.error("Fallo en la consulta:", error);
                output.innerText = "Error: " + (error.response?.status || error.message);
                statusDiv.style.color = "red";
                statusDiv.innerText = "ERROR: Verifica el ID o la API Key";
                
                if(error.message.includes('CORS')) {
                    alert("Recuerda activar el acceso en: https://cors-anywhere.herokuapp.com/corsdemo");
                }
            }
        }
    </script>
</body>
</html>
